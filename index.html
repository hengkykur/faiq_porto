<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="image" href="/vidiohome_poster.webp" fetchpriority="high">
    <link rel="preload" as="video" href="/vidiohomebulet.mp4" fetchpriority="high">
    <!-- Critical fonts: loaded normally (display + body) -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Non-critical fonts: loaded async (typewriter, space invaders, accent) -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400;1,500;1,600&family=Space+Grotesk:wght@300;400;500;600;700&family=Press+Start+2P&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400;1,500;1,600&family=Space+Grotesk:wght@300;400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <title>Faiq | Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Preloader -->
    <div id="preloader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.3s ease-out; pointer-events: none;">
      <div style="font-family: 'Outfit', sans-serif; color: #fff; font-size: 24px; font-weight: 700; letter-spacing: 0.3em; margin-bottom: 20px; animation: pulse 2s infinite;">FAIQ_A.M</div>
      <div style="width: 200px; height: 2px; background: rgba(255,255,255,0.1); position: relative; overflow: hidden;">
        <div id="preloader-bar" style="position: absolute; top: 0; left: 0; height: 100%; width: 40%; background: #818cf8; animation: progress 1.5s infinite ease-in-out;"></div>
      </div>
      <div style="position: absolute; bottom: 24px; left: 0; width: 100%; box-sizing: border-box; text-align: center; font-size: 10px; color: rgba(255,255,255,0.3); font-family: 'Plus Jakarta Sans', sans-serif; padding: 0 20px; letter-spacing: 0.05em; line-height: 1.5; max-width: 100vw;">
        Visual assets generated with AI to enhance user experience<br />while focusing on core development.
      </div>
      <style>
      @keyframes pulse {
        0%, 100% { opacity: 0.5; filter: blur(2px); }
        50% { opacity: 1; filter: blur(0px); }
      }
      @keyframes progress {
        0% { left: -40%; }
        100% { left: 100%; }
      }
      .loaded #preloader {
        opacity: 0;
      }
      </style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
