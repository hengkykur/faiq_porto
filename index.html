<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>Faiq | Portfolio</title>
  </head>
  <body>
    <style>
      #preloader {
        position: fixed;
        inset: 0;
        background: #0a0a0c;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.8s ease-out, visibility 0.8s;
      }
      .loader-content {
        text-align: center;
      }
      .loader-logo {
        font-family: 'Outfit', sans-serif;
        font-size: 2.5rem;
        font-weight: 700;
        color: white;
        letter-spacing: -2px;
        opacity: 0;
        animation: fadeIn 0.5s ease forwards;
      }
      .loader-bar {
        width: 120px;
        height: 2px;
        background: oklch(65% 0.25 260 / 20%);
        margin: 1.5rem auto 0;
        position: relative;
        overflow: hidden;
        border-radius: 4px;
      }
      .loader-progress {
        width: 40%;
        height: 100%;
        background: oklch(65% 0.25 260);
        position: absolute;
        animation: progress 1.5s infinite ease-in-out;
      }
      @keyframes fadeIn {
        to { opacity: 1; transform: translateY(0); }
        from { opacity: 0; transform: translateY(20px); }
      }
      @keyframes progress {
        0% { left: -40%; }
        100% { left: 100%; }
      }
      .loaded #preloader {
        opacity: 0;
        visibility: hidden;
      }
    </style>
    <div id="preloader">
      <div class="loader-content">
        <div class="loader-logo">Faiq<span style="color: oklch(65% 0.25 260); font-style: italic;">_a.m</span></div>
        <div class="loader-bar"><div class="loader-progress"></div></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
